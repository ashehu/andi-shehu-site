<svg xmlns="http://www.w3.org/2000/svg" width="1125" height="675" viewBox="0 0 1125 675" role="img" aria-labelledby="title desc">
  <title id="title">Business card back option nine</title>
  <desc id="desc">Systems-style back with AS seal, subtle network geometry, and QR.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3ea" />
      <stop offset="1" stop-color="#ece4d6" />
