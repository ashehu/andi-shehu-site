    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf8" />
      <stop offset="1" stop-color="#f4eee2" />
    </linearGradient>
    <pattern id="grain" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#d7cfbf" />
      <circle cx="8" cy="6" r="0.7" fill="#d3cab9" />
      <circle cx="4" cy="9" r="0.55" fill="#d9d0bf" />
    </pattern>
    <style><![CDATA[
      .bleed { fill: url(#paper); }
      .grain { fill: url(#grain); opacity: 0.22; }
      .trim { fill: url(#panel); stroke: #26231f; stroke-width: 2; }
      .crop { stroke: #26231f; stroke-width: 2; }
      .frame { fill: none; stroke: #1f3c5d; stroke-width: 2.0; }
      .frame-soft { fill: none; stroke: #7d8b97; stroke-width: 1.1; stroke-dasharray: 4 6; }
      .signal { stroke: #1f3c5d; stroke-width: 1.7; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .signal-soft { stroke: #7d8b97; stroke-width: 1.2; fill: none; stroke-linecap: round; }
      .accent { fill: none; stroke: #a53a2e; stroke-width: 2.8; stroke-linecap: round; }
      .node { fill: #1f3c5d; }
      .node-soft { fill: #7d8b97; }
      .node-accent { fill: #a53a2e; }
      .grid { stroke: #d4ccbf; stroke-width: 0.9; fill: none; }
      .blue { fill: #1f3c5d; }
      .serif { font-family: "Cormorant Garamond", Georgia, serif; }
    ]]></style>
