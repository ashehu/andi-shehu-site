<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="980" viewBox="0 0 2200 980" role="img" aria-labelledby="title desc">
  <title id="title">Business card option nine preview</title>
  <desc id="desc">Preview of cleaned front and systems-style back.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3ea" />
      <stop offset="1" stop-color="#ece4d6" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf8" />
      <stop offset="1" stop-color="#f4eee2" />
    </linearGradient>
    <pattern id="grain" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#d7cfbf" />
      <circle cx="8" cy="6" r="0.7" fill="#d3cab9" />
      <circle cx="4" cy="9" r="0.55" fill="#d9d0bf" />
    </pattern>
    <style><![CDATA[
      .bg { fill: url(#paper); }
      .grain { fill: url(#grain); opacity: 0.22; }
      .card { fill: url(#panel); stroke: #26231f; stroke-width: 4; }
      .rule { stroke: #1f3c5d; stroke-width: 2.0; }
      .fine-rule { stroke: #7d8b97; stroke-width: 1.1; }
      .frame { fill: none; stroke: #1f3c5d; stroke-width: 2.0; }
      .frame-soft { fill: none; stroke: #7d8b97; stroke-width: 1.1; stroke-dasharray: 4 6; }
      .signal { stroke: #1f3c5d; stroke-width: 1.7; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .signal-soft { stroke: #7d8b97; stroke-width: 1.2; fill: none; stroke-linecap: round; }
      .accent { fill: none; stroke: #a53a2e; stroke-width: 2.8; stroke-linecap: round; }
      .node { fill: #1f3c5d; }
      .node-soft { fill: #7d8b97; }
      .node-accent { fill: #a53a2e; }
      .grid { stroke: #d4ccbf; stroke-width: 0.9; fill: none; }
      .ink { fill: #141414; }
      .ink-soft { fill: #3c3a37; }
      .muted { fill: #66717c; }
      .blue { fill: #1f3c5d; }
      .serif { font-family: "Cormorant Garamond", Georgia, serif; }
      .sans { font-family: "IBM Plex Sans", "Trebuchet MS", sans-serif; }
      .caps { font-family: "IBM Plex Sans", "Trebuchet MS", sans-serif; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
